name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Validate Prisma schema
        run: pnpm prisma validate

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cold_calling
          AUTH_SECRET: ci-auth-secret-ci-auth-secret-ci-auth-secret
          APP_URL: http://localhost:3000
          ENCRYPTION_KEY: ci-encryption-secret-ci-encryption-secret
          SIGNALWIRE_WEBHOOK_SECRET: ci-webhook-secret
