services:
  postgres:
    image: postgres:16-alpine
    container_name: cold-calling-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cold_calling
    ports:
      - "5432:5432"
    volumes:
      - cold_calling_pgdata:/var/lib/postgresql/data

volumes:
  cold_calling_pgdata:
